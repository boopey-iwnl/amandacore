<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>amandacore Local Admin</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151b;
      --panel: #18212b;
      --panel-2: #202b37;
      --text: #edf2f7;
      --muted: #9fb0c3;
      --border: #334252;
      --accent: #2f8f6f;
      --danger: #b94f4f;
      --warn: #c4923d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: #131a22;
    }
    h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    main {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      min-height: calc(100vh - 58px);
    }
    aside {
      border-right: 1px solid var(--border);
      padding: 1rem;
      background: var(--panel);
    }
    section {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    label {
      display: block;
      margin-top: 0.65rem;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
    }
    input, select, textarea {
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.48rem 0.55rem;
      color: var(--text);
      background: #0d131a;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
    }
    textarea { min-height: 74px; resize: vertical; }
    button {
      min-height: 32px;
      padding: 0.45rem 0.7rem;
      color: white;
      background: var(--accent);
      border: 0;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
    }
    button.secondary { background: #425166; }
    button.warn { background: var(--warn); }
    button.danger { background: var(--danger); }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.7rem;
    }
    .row > * { flex: 1 1 auto; }
    .status {
      color: var(--muted);
      font-size: 0.86rem;
      white-space: nowrap;
    }
    .result-list {
      margin-top: 0.75rem;
      display: grid;
      gap: 0.4rem;
    }
    .result-list button {
      text-align: left;
      background: var(--panel-2);
      border: 1px solid var(--border);
    }
    .details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }
    pre {
      overflow: auto;
      min-height: 160px;
      max-height: 460px;
      margin: 0;
      padding: 0.8rem;
      background: #0b1118;
      border: 1px solid var(--border);
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    h2 {
      margin: 0 0 0.4rem;
      font-size: 0.95rem;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--border); }
      .details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>amandacore Local Admin</h1>
    <div id="status" class="status">Not signed in</div>
  </header>

  <main>
    <aside>
      <section>
        <h2>Session</h2>
        <label for="authUrl">Auth URL</label>
        <input id="authUrl" value="http://127.0.0.1:8081" />
        <label for="adminUrl">Admin URL</label>
        <input id="adminUrl" value="http://127.0.0.1:8086" />
        <label for="worldUrl">World URL</label>
        <input id="worldUrl" value="http://127.0.0.1:8085" />
        <label for="username">Username</label>
        <input id="username" autocomplete="username" />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
        <div class="row">
          <button onclick="login()">Login</button>
          <button class="secondary" onclick="loadAuthz()">Check Permissions</button>
        </div>
      </section>

      <section>
        <h2>Lookup</h2>
        <label for="characterQuery">Character Name or ID</label>
        <input id="characterQuery" />
        <div class="row">
          <button data-permission="view_character" onclick="searchCharacters()">Search Characters</button>
          <button data-permission="view_account" class="secondary" onclick="loadAccounts()">Accounts</button>
        </div>
        <div id="results" class="result-list"></div>
      </section>

      <section>
        <h2>Reason</h2>
        <textarea id="reason" placeholder="Required for every mutation"></textarea>
      </section>
    </aside>

    <div>
      <section>
        <h2>Character Tools</h2>
        <label for="characterId">Character ID</label>
        <input id="characterId" />
        <div class="row">
          <button data-permission="view_character" onclick="loadCharacter()">Load Character</button>
          <button data-permission="teleport_character" class="warn" onclick="teleport('stonewake_spawn')">Stonewake</button>
          <button data-permission="teleport_character" class="warn" onclick="teleport('current_zone_safe')">Current Safe</button>
          <button data-permission="repair_character" class="danger" onclick="repair()">Repair</button>
          <button data-permission="repair_character" class="danger" onclick="kick()">Kick</button>
        </div>
      </section>

      <section>
        <h2>Economy</h2>
        <div class="details">
          <div>
            <label for="itemId">Item ID</label>
            <input id="itemId" value="camp_ration" />
            <label for="itemQuantity">Quantity</label>
            <input id="itemQuantity" type="number" min="1" value="1" />
            <div class="row">
              <button data-permission="grant_item" onclick="itemChange('grant')">Grant Item</button>
              <button data-permission="grant_item" class="danger" onclick="itemChange('remove')">Remove Item</button>
            </div>
          </div>
          <div>
            <label for="currencyCopper">Copper</label>
            <input id="currencyCopper" type="number" min="1" value="1" />
            <div class="row">
              <button data-permission="grant_currency" onclick="currencyChange('grant')">Grant Currency</button>
              <button data-permission="grant_currency" class="danger" onclick="currencyChange('remove')">Remove Currency</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <h2>Quest And Moderation</h2>
        <div class="details">
          <div>
            <label for="questId">Quest ID</label>
            <input id="questId" value="sv_first_muster" />
            <div class="row">
              <button data-permission="modify_quest_state" class="warn" onclick="questChange('reset')">Reset Quest</button>
              <button data-permission="modify_quest_state" class="warn" onclick="questChange('complete-objective')">Complete Objective</button>
            </div>
          </div>
          <div>
            <label for="accountId">Account ID</label>
            <input id="accountId" />
            <label for="muteSeconds">Mute/Suspend Seconds</label>
            <input id="muteSeconds" type="number" min="1" value="300" />
            <div class="row">
              <button data-permission="moderate_chat" class="warn" onclick="mute()">Mute</button>
              <button data-permission="moderate_chat" class="secondary" onclick="unmute()">Unmute</button>
              <button data-permission="suspend_account" class="danger" onclick="suspend(true)">Suspend</button>
              <button data-permission="suspend_account" class="secondary" onclick="suspend(false)">Unsuspend</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <h2>Support And Audit</h2>
        <div class="row">
          <button data-permission="manage_support" onclick="loadTickets()">Tickets</button>
          <button data-permission="view_audit_log" onclick="loadAudit()">Audit</button>
        </div>
      </section>

      <section>
        <h2>Output</h2>
        <pre id="output"></pre>
      </section>
    </div>
  </main>

  <script>
    let session = null;
    let permissions = new Set();
    const $ = (id) => document.getElementById(id);
    const output = (value) => $("output").textContent = JSON.stringify(value, null, 2);
    const status = (text) => $("status").textContent = text;
    const authUrl = () => $("authUrl").value.replace(/\/$/, "");
    const adminUrl = () => $("adminUrl").value.replace(/\/$/, "");
    const worldUrl = () => $("worldUrl").value.replace(/\/$/, "");
    const headers = () => ({
      "Authorization": "Bearer " + session.accessToken,
      "Content-Type": "application/json"
    });

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      const text = await response.text();
      const payload = text ? JSON.parse(text) : {};
      if (!response.ok) throw payload;
      return payload;
    }

    async function login() {
      session = await requestJson(authUrl() + "/v1/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: $("username").value, password: $("password").value })
      });
      status("Signed in: " + session.accountId);
      output({ accountId: session.accountId, expiresAt: session.expiresAt });
      await loadAuthz();
    }

    async function loadAuthz() {
      const data = await requestJson(adminUrl() + "/v1/admin/authz/me", { headers: headers() });
      permissions = new Set(data.permissions || []);
      applyPermissions();
      output(data);
    }

    function applyPermissions() {
      document.querySelectorAll("[data-permission]").forEach((button) => {
        button.disabled = !permissions.has(button.dataset.permission);
      });
    }

    async function loadAccounts() {
      output(await requestJson(adminUrl() + "/v1/admin/accounts", { headers: headers() }));
    }

    async function searchCharacters() {
      const query = encodeURIComponent($("characterQuery").value);
      const data = await requestJson(adminUrl() + "/v1/admin/characters?query=" + query, { headers: headers() });
      $("results").innerHTML = "";
      for (const character of data.characters || []) {
        const button = document.createElement("button");
        button.textContent = character.displayName + " - " + character.id;
        button.onclick = () => {
          $("characterId").value = character.id;
          $("accountId").value = character.accountId;
          loadCharacter();
        };
        $("results").appendChild(button);
      }
      output(data);
    }

    async function loadCharacter() {
      const id = $("characterId").value;
      const data = await requestJson(adminUrl() + "/v1/admin/characters/" + encodeURIComponent(id), { headers: headers() });
      if (data.character) $("accountId").value = data.character.accountId || $("accountId").value;
      output(data);
    }

    function mutationPayload(action, target, extra = {}) {
      const reason = $("reason").value.trim();
      if (!reason) throw { error: "reason_required", message: "Enter a reason before mutating state." };
      const message = "Apply audited admin action?\n\nAction: " + action + "\nTarget: " + target + "\nReason: " + reason;
      if (!confirm(message)) throw { error: "cancelled" };
      return { ...extra, reason, confirm: true };
    }

    async function teleport(destination) {
      try {
        const id = $("characterId").value;
        output(await requestJson(worldUrl() + "/v1/world/admin/characters/" + encodeURIComponent(id) + "/teleport", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload("teleport " + destination, id, { destination }))
        }));
      } catch (err) { output(err); }
    }

    async function repair() {
      try {
        const id = $("characterId").value;
        output(await requestJson(worldUrl() + "/v1/world/admin/characters/" + encodeURIComponent(id) + "/repair", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload("repair character", id, { normalize: true, restoreStarterAbilities: true, rebuildActionBar: true, revive: true }))
        }));
      } catch (err) { output(err); }
    }

    async function itemChange(kind) {
      try {
        const id = $("characterId").value;
        output(await requestJson(worldUrl() + "/v1/world/admin/characters/" + encodeURIComponent(id) + "/items/" + kind, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload(kind + " item", id + " / " + $("itemId").value, { itemId: $("itemId").value, quantity: Number($("itemQuantity").value) }))
        }));
      } catch (err) { output(err); }
    }

    async function currencyChange(kind) {
      try {
        const id = $("characterId").value;
        output(await requestJson(worldUrl() + "/v1/world/admin/characters/" + encodeURIComponent(id) + "/currency/" + kind, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload(kind + " currency", id, { copper: Number($("currencyCopper").value) }))
        }));
      } catch (err) { output(err); }
    }

    async function questChange(kind) {
      try {
        const id = $("characterId").value;
        output(await requestJson(adminUrl() + "/v1/admin/characters/" + encodeURIComponent(id) + "/quests/" + kind, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload(kind + " quest", id + " / " + $("questId").value, { questId: $("questId").value }))
        }));
      } catch (err) { output(err); }
    }

    async function mute() {
      try {
        output(await requestJson(adminUrl() + "/v1/admin/moderation/mute", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload("mute character", $("characterId").value, { characterId: $("characterId").value, durationSeconds: Number($("muteSeconds").value) }))
        }));
      } catch (err) { output(err); }
    }

    async function unmute() {
      try {
        output(await requestJson(adminUrl() + "/v1/admin/moderation/unmute", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload("unmute character", $("characterId").value, { characterId: $("characterId").value }))
        }));
      } catch (err) { output(err); }
    }

    async function suspend(enabled) {
      try {
        output(await requestJson(adminUrl() + "/v1/admin/moderation/" + (enabled ? "suspend" : "unsuspend"), {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload(enabled ? "suspend account" : "unsuspend account", $("accountId").value, { accountId: $("accountId").value, durationSeconds: enabled ? Number($("muteSeconds").value) : 0 }))
        }));
      } catch (err) { output(err); }
    }

    async function kick() {
      try {
        output(await requestJson(worldUrl() + "/v1/world/admin/characters/" + encodeURIComponent($("characterId").value) + "/session/invalidate", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(mutationPayload("kick character", $("characterId").value))
        }));
      } catch (err) { output(err); }
    }

    async function loadTickets() {
      output(await requestJson(adminUrl() + "/v1/admin/support/tickets", { headers: headers() }));
    }

    async function loadAudit() {
      const id = encodeURIComponent($("characterId").value);
      output(await requestJson(adminUrl() + "/v1/admin/audit?targetCharacterId=" + id, { headers: headers() }));
    }

    document.addEventListener("DOMContentLoaded", applyPermissions);
  </script>
</body>
</html>
