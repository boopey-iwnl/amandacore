services:
  postgres:
    image: postgres:16
    env_file:
      - ../../.secrets/amandacore.dev.env
    environment:
      POSTGRES_DB: amandacore
      POSTGRES_USER: amandacore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data:
